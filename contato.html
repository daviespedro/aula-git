<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contato | Tech University</title>
    <style>
      body {
        background-image: url(imagens/backgroundteste.png);
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
        height: 100vh;
        margin: 0;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px;
      }
      nav {
        position: absolute;
        top: 150px;
        right: 150px;
      }
      nav ul {
        list-style: none;
        display: flex;
        gap: 20px;
      }
      nav a {
        text-decoration: none;
        color: white;
        font-size: 22px;
        font-weight: bold;
        font-family: "Verdana", sans-serif;
      }
      nav a + a::before {
        content: "|";
        margin-right: 10px;
      }
      .conteudo-contato {
        padding: 40px;
        color: white;
      }
      .contatoforms {
        padding: 40px;
      }
      form {
        color: white;
      }
      form label {
        display: block;
        margin-bottom: 10px;
        font-weight: bold;
      }
      form input,
      form textarea {
        width: 100%;
        padding: 10px;
        margin-bottom: 20px;
        border: none;
        border-radius: 5px;
      }
      form button {
        padding: 10px 20px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <header>
      <img src="imagens/techlogo1.png" alt="" height="200" />
      <nav>
        <a href="index.html" target="_blank">HOME</a> |
        <a href="quem-somos.html" target="_blank">QUEM SOMOS</a> |
        <a href="contato.html" target="_blank">CONTATO</a>
      </nav>
    </header>
    <section class="conteudo-contato">
      <h1>ENTRE EM CONTATO</h1>
      <p>
        Lorem ipsum dolor sit, amet consectetur adipisicing elit. Sapiente
        voluptas et alias, qui saepe minima quo, ipsum dolore molestiae soluta
        provident nihil quisquam accusamus iure culpa officia temporibus quod
        nostrum?
      </p>
    </section>
    <section class="contatoforms">
      <form>
        <label for="Email">Seu Email:</label>
        <input type="text" id="nome" name="nome" required />

        <label for="assunto">Assunto:</label>
        <input type="text" id="assunto" name="assunto" required />

        <label for="descricao">Descrição:</label>
        <textarea id="descricao" name="descricao" required></textarea>

        <button type="submit">Enviar</button>
      </form>
    </section>
  </body>
</html>
